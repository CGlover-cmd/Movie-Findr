<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Findr</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main id="setup-screen" class="screen active">
        <h1>Movie Findr</h1>
        <p>Connect the starting movie to the target movie using the cast!</p>

        <!-- ── FILTER PANEL ──────────────────────────────────────────────
             Collapsed by default. Toggle button reveals/hides the controls.
             All values are read by game.js when movies are fetched.
        ──────────────────────────────────────────────────────────────── -->
        <div id="filter-section">

            <button id="filter-toggle-btn" class="filter-toggle-btn">
                ⚙ Filters <span id="filter-active-badge" class="filter-badge hidden">●</span>
            </button>

            <div id="filter-panel" class="filter-panel hidden">

                <!-- Year Range -->
                <div class="filter-group">
                    <label class="filter-label">Release Year</label>
                    <div class="filter-row">
                        <div class="filter-field">
                            <label for="filter-year-min">From</label>
                            <input type="number" id="filter-year-min" class="filter-input" placeholder="1900" min="1900" max="2099">
                        </div>
                        <div class="filter-field">
                            <label for="filter-year-max">To</label>
                            <input type="number" id="filter-year-max" class="filter-input" placeholder="2025" min="1900" max="2099">
                        </div>
                    </div>
                </div>

                <!-- Genre — multi-select pill buttons, populated by api.js on load -->
                <div class="filter-group">
                    <label class="filter-label">Genre <span class="filter-hint">(pick any)</span></label>
                    <div id="genre-pill-container" class="pill-container">
                        <span class="filter-hint">Loading genres…</span>
                    </div>
                </div>

                <!-- Language -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-language">Original Language</label>
                    <select id="filter-language" class="filter-select">
                        <option value="">Any</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="es">Spanish</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese (Mandarin)</option>
                        <option value="hi">Hindi</option>
                        <option value="pt">Portuguese</option>
                    </select>
                </div>

                <!-- Minimum Rating -->
                <div class="filter-group">
                    <label class="filter-label">Minimum Rating: <span id="rating-value-display">Any</span></label>
                    <input type="range" id="filter-rating" class="filter-range" min="0" max="9" step="0.5" value="0">
                    <div class="filter-range-labels">
                        <span>No minimum</span>
                        <span>9.0+</span>
                    </div>
                </div>

                <!-- Sort Order -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-sort">Sort By</label>
                    <select id="filter-sort" class="filter-select">
                        <option value="popularity.desc">Most Popular</option>
                        <option value="vote_average.desc">Highest Rated</option>
                        <option value="primary_release_date.desc">Newest First</option>
                        <option value="primary_release_date.asc">Oldest First</option>
                        <option value="revenue.desc">Highest Grossing</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button id="filter-apply-btn" class="filter-apply-btn">Apply Filters</button>
                    <button id="filter-clear-btn" class="filter-clear-btn">Clear All</button>
                </div>

            </div>
        </div>
        <!-- ── END FILTER PANEL ──────────────────────────────────────── -->

        <div class="setup-container">
            <div class="movie-setup-col">
                <h2>Start</h2>
                <div id="start-movie-display" class="movie-placeholder poster-rounded"></div>
                <button id="redraw-start-btn" class="redraw-btn">I don't know this movie</button>
            </div>

            <div class="movie-setup-col">
                <h2>Target</h2>
                <div id="target-movie-display" class="movie-placeholder poster-rounded"></div>
                <button id="redraw-target-btn" class="redraw-btn">I don't know this movie</button>
            </div>
        </div>

        <button id="start-game-btn" class="primary-btn" disabled>Loading Movies…</button>
    </main>

    <main id="game-board" class="screen hidden">
        <header id="game-header">
            <div class="header-stat">Time: <span id="timer-display">00:00</span></div>
            <div class="header-stat">Steps: <span id="step-display">0</span></div>
            <div class="header-target">
                Goal:
                <img id="goal-poster-thumbnail" src="" alt="Goal movie poster">
                <span id="target-title-display">…</span>
            </div>
        </header>

        <div id="vertical-tree"></div>
    </main>

    <script type="module" src="game.js"></script>

</body>
</html>
